name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

  # ──────────────────────────────────────────────
  # JOB 2: Test
  # ──────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    # Spin up a real MongoDB service container for integration tests
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 8000
      MONGODB_URI: mongodb://localhost:27017/streamx_test
      CORS_ORIGIN: "*"
      ACCESS_TOKEN_SECRET: ci_access_token_secret_placeholder
      ACCESS_TOKEN_EXPIRY: 1d
      REFRESH_TOKEN_SECRET: ci_refresh_token_secret_placeholder
      REFRESH_TOKEN_EXPIRY: 10d
      # Cloudinary — use dummy values; skip real uploads in tests
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME || 'dummy' }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY || '000000000000000' }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET || 'dummy_secret' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          until mongosh --eval "db.runCommand({ ping: 1 })" --quiet; do
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run tests
        run: npm test --if-present

  # ──────────────────────────────────────────────
  # JOB 3: Security audit
  # ──────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit for vulnerabilities
        # Fail on high or critical vulnerabilities only
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────
  # JOB 5: Notify on failure
  # ──────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, audit]
    if: failure()

    steps:
      - name: Post failure comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Backend CI failed** on \`${{ github.sha }}\`.\n\nPlease check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            })